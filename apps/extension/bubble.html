<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #18181b;
        overflow: hidden;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1); /* mirror like Loom's self-view */
      }
      .msg {
        color: #a1a1aa;
        font: 12px system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div class="msg">Starting camera…</div>
    <script src="bubble.js"></script>
  </body>
</html>
